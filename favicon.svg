<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1035"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff5c2b"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5c2b"/>
      <stop offset="100%" style="stop-color:#c73e15"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Barras del gráfico -->
  <rect x="4" y="19" width="5" height="9" rx="1.5" fill="url(#bar1)" opacity="0.85"/>
  <rect x="11" y="14" width="5" height="14" rx="1.5" fill="url(#bar2)" opacity="0.9"/>
  <rect x="18" y="10" width="5" height="18" rx="1.5" fill="url(#bar3)" opacity="0.85"/>

  <!-- Flecha de tendencia al alza -->
  <polyline
    points="4,22 10,16 16,18 26,7"
    fill="none"
    stroke="url(#arrow)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Punta de la flecha -->
  <polyline
    points="21,5 26,7 24,12"
    fill="none"
    stroke="url(#arrow)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Punto brillante en el pico -->
  <circle cx="26" cy="7" r="2" fill="#ff8c42"/>
  <circle cx="26" cy="7" r="1" fill="#fff" opacity="0.8"/>
</svg>
